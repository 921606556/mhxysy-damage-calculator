<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梦幻西游手游法宠伤害计算器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .controls {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .control-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 10px;
        }
        .control-group {
            flex: 1;
            min-width: 150px;
        }
        label {
            display: block;
            margin-bottom: 3px;
            font-weight: bold;
            color: #333;
            font-size: 13px;
        }
        input[type="range"] {
            width: 100%;
            margin-bottom: 3px;
        }
        .value-display {
            text-align: center;
            color: #667eea;
            font-weight: bold;
            font-size: 14px;
        }
        .pet-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .pet-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .pet-btn.active {
            background: #667eea;
            color: white;
        }
        .skill-config {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        @media (max-width: 1200px) {
            .skill-config {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        @media (max-width: 768px) {
            .skill-config {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        .skill-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .skill-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }
        .skill-item label {
            margin: 0;
            font-weight: normal;
            cursor: pointer;
            font-size: 12px;
            white-space: nowrap;
        }
        .skill-item select {
            margin-left: auto;
            padding: 4px 6px;
            border-radius: 4px;
            border: 1px solid #ddd;
            font-size: 12px;
            min-width: 100px;
        }
        .stats-panel {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            margin: 8px 0;
        }
        .stat-label {
            font-size: 12px;
            opacity: 0.9;
        }
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 15px;
        }
        @media (max-width: 1024px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }
        .chart-container {
            background: white;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .chart-title {
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }
        canvas {
            max-height: 280px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏯 梦幻西游手游法宠伤害计算器</h1>
        
        <div class="controls">
            <div class="pet-selector">
                <button class="pet-btn active" onclick="switchPet('A')">宠物A（全高级）</button>
                <button class="pet-btn" onclick="switchPet('B')">宠物B（全低级）</button>
            </div>
            
            <div class="control-row">
                <div class="control-group">
                    <label>宠物等级</label>
                    <input type="range" id="petLevel" min="69" max="115" value="79" oninput="updateValue('petLevel', 'petLevelVal')">
                    <div class="value-display" id="petLevelVal">79</div>
                </div>
                <div class="control-group">
                    <label>宠物法伤</label>
                    <input type="range" id="petDamage" min="800" max="1500" value="1100" oninput="updateValue('petDamage', 'petDamageVal')">
                    <div class="value-display" id="petDamageVal">1100</div>
                </div>
                <div class="control-group">
                    <label>对方法防</label>
                    <input type="range" id="targetDefense" min="400" max="1400" value="800" oninput="updateValue('targetDefense', 'targetDefenseVal')">
                    <div class="value-display" id="targetDefenseVal">800</div>
                </div>
                <div class="control-group">
                    <label>通灵法忽视</label>
                    <select id="tongling" onchange="calculate()" style="width:100%;padding:5px;border-radius:4px;border:1px solid #ddd;">
                        <option value="6">6%</option>
                        <option value="7.5">7.5%</option>
                        <option value="9">9%</option>
                        <option value="10.5">10.5%</option>
                        <option value="12" selected>12%</option>
                    </select>
                </div>
            </div>
            
            <div class="skill-config">
                <div class="skill-item">
                    <input type="checkbox" id="moxin" checked onchange="calculate()">
                    <label for="moxin">魔之心</label>
                    <select id="moxinLevel" onchange="calculate()">
                        <option value="0.2" selected>高级(+20%)</option>
                        <option value="0.1">低级(+10%)</option>
                    </select>
                </div>
                <div class="skill-item">
                    <input type="checkbox" id="huixin" checked onchange="calculate()">
                    <label for="huixin">会心</label>
                    <select id="huixinLevel" onchange="calculate()">
                        <option value="34.5" selected>高级(34.5)</option>
                        <option value="17">低级(17)</option>
                    </select>
                </div>
                <div class="skill-item">
                    <input type="checkbox" id="xieli" checked onchange="calculate()">
                    <label for="xieli">协力</label>
                    <select id="xieliLevel" onchange="calculate()">
                        <option value="0.15">高级15%</option>
                        <option value="0.12" selected>高级12%</option>
                        <option value="0.09">高级9%</option>
                        <option value="0.06">高级6%</option>
                        <option value="0.03">高级3%</option>
                        <option value="0.10">低级10%</option>
                        <option value="0.08">低级8%</option>
                        <option value="0.06">低级6%</option>
                        <option value="0.04">低级4%</option>
                        <option value="0.02">低级2%</option>
                    </select>
                </div>
                <div class="skill-item">
                    <input type="checkbox" id="falian" checked onchange="calculate()">
                    <label for="falian">法连</label>
                    <select id="falianLevel" onchange="calculate()">
                        <option value="0.3" selected>高级(30%)</option>
                        <option value="0.2">低级(20%)</option>
                    </select>
                </div>
                <div class="skill-item">
                    <input type="checkbox" id="fabao" checked onchange="calculate()">
                    <label for="fabao">法爆</label>
                    <select id="fabaoLevel" onchange="calculate()">
                        <option value="0.15" selected>高级(15%)</option>
                        <option value="0.1">低级(10%)</option>
                    </select>
                </div>
            </div>
        </div>
        
        <div class="stats-panel">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">单目标期望伤害</div>
                    <div class="stat-value" id="singleTarget">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">三分灵总期望</div>
                    <div class="stat-value" id="totalDamage">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">vs 法防800基准</div>
                    <div class="stat-value" id="vsBase">0%</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">有效法防</div>
                    <div class="stat-value" id="effectiveDefense">0</div>
                </div>
            </div>
        </div>
        
        <div class="charts-grid">
            <div class="chart-container">
                <div class="chart-title">📈 法伤变化对伤害的影响（对方法防固定800）</div>
                <canvas id="damageChart"></canvas>
            </div>
            <div class="chart-container">
                <div class="chart-title">📉 对方法防变化对伤害的影响（我方1100法伤）</div>
                <canvas id="defenseChart"></canvas>
            </div>
        </div>
        
        <div class="charts-grid">
            <div class="chart-container">
                <div class="chart-title">🔥 通灵法等级影响对比</div>
                <canvas id="tonglingChart"></canvas>
            </div>
            <div class="chart-container">
                <div class="chart-title">⚔️ 宠物A vs 宠物B 全面对比</div>
                <canvas id="compareChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        let currentPet = 'A';
        let damageChart, defenseChart, tonglingChart, compareChart;
        
        // 宠物预设配置
        const petConfigs = {
            A: {
                moxin: true, moxinLevel: 0.2,
                huixin: true, huixinLevel: 34.5,
                xieli: true, xieliLevel: 0.12,
                falian: true, falianLevel: 0.3,
                fabao: true, fabaoLevel: 0.15
            },
            B: {
                moxin: true, moxinLevel: 0.1,
                huixin: true, huixinLevel: 17,
                xieli: true, xieliLevel: 0.08,
                falian: true, falianLevel: 0.2,
                fabao: true, fabaoLevel: 0.1
            }
        };
        
        function init() {
            initCharts();
            calculate();
        }
        
        function switchPet(pet) {
            currentPet = pet;
            document.querySelectorAll('.pet-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            const config = petConfigs[pet];
            for (let key in config) {
                const el = document.getElementById(key);
                if (el) {
                    if (el.type === 'checkbox') {
                        el.checked = config[key];
                    } else {
                        el.value = config[key];
                    }
                }
            }
            calculate();
        }
        
        function updateValue(inputId, displayId) {
            const val = document.getElementById(inputId).value;
            document.getElementById(displayId).textContent = val;
            calculate();
        }
        
        function calculateDamage(faShang, targetDef, tonglingPercent, skills) {
            const level = parseInt(document.getElementById('petLevel').value);
            
            // 通灵法忽视
            const tonglingIgnore = targetDef * tonglingPercent / 100;
            
            // 会心穿透
            const huixinPenetrate = skills.huixin ? parseFloat(document.getElementById('huixinLevel').value) : 0;
            
            // 有效法防
            const effectiveDef = Math.max(0, targetDef - tonglingIgnore - huixinPenetrate);
            
            // 基础伤害
            const baseDamage = Math.max(0, (faShang - effectiveDef) * 0.7);
            
            // 等级固定伤害
            const levelDamage = (level - 10) * 2;
            
            // 魔心加成
            const moxinBonus = skills.moxin ? parseFloat(document.getElementById('moxinLevel').value) : 0;
            
            // 协力加成
            const xieliBonus = skills.xieli ? parseFloat(document.getElementById('xieliLevel').value) : 0;
            
            // 单目标基础伤害（无分灵，无法爆法连）
            // 魔心加成伤害结果（基础+等级）
            let singleBase = (baseDamage + levelDamage) * (1 + moxinBonus);
            // 协力加成
            if (skills.xieli) {
                singleBase = singleBase * (1 + xieliBonus);
            }
            
            // 分灵系数
            const fenling = [0.9, 0.8, 0.7];
            let totalBase = 0;
            for (let f of fenling) {
                totalBase += singleBase * f;
            }
            
            // 法爆期望
            const fabaoRate = skills.fabao ? parseFloat(document.getElementById('fabaoLevel').value) : 0;
            const fabaoExpect = 1 + fabaoRate;
            
            // 法连期望
            const falianRate = skills.falian ? parseFloat(document.getElementById('falianLevel').value) : 0;
            const falianExpect = 1 + falianRate * 0.5;
            
            // 法爆法连期望系数
            const baolianExpect = fabaoExpect * falianExpect;
            
            // 单目标期望（含法爆法连）
            const singleExpect = singleBase * baolianExpect;
            
            // 三分灵总期望
            const totalExpect = totalBase * baolianExpect;
            
            return {
                single: singleExpect,
                total: totalExpect,
                effectiveDef: effectiveDef
            };
        }
        
        function getCurrentSkills() {
            return {
                moxin: document.getElementById('moxin').checked,
                huixin: document.getElementById('huixin').checked,
                xieli: document.getElementById('xieli').checked,
                falian: document.getElementById('falian').checked,
                fabao: document.getElementById('fabao').checked
            };
        }
        
        function calculate() {
            const faShang = parseInt(document.getElementById('petDamage').value);
            const targetDef = parseInt(document.getElementById('targetDefense').value);
            const tongling = parseFloat(document.getElementById('tongling').value);
            const skills = getCurrentSkills();
            
            const result = calculateDamage(faShang, targetDef, tongling, skills);
            
            // 基准对比（法防800）
            const baseResult = calculateDamage(faShang, 800, tongling, skills);
            const vsBase = ((result.total - baseResult.total) / baseResult.total * 100).toFixed(1);
            
            document.getElementById('singleTarget').textContent = Math.round(result.single);
            document.getElementById('totalDamage').textContent = Math.round(result.total);
            document.getElementById('vsBase').textContent = (vsBase > 0 ? '+' : '') + vsBase + '%';
            document.getElementById('effectiveDefense').textContent = Math.round(result.effectiveDef);
            
            updateCharts();
        }
        
        function initCharts() {
            const commonOptions = {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { intersect: false, mode: 'index' },
                plugins: {
                    legend: {
                        labels: { font: { size: 11 } }
                    }
                },
                scales: {
                    x: { 
                        ticks: { font: { size: 10 } },
                        title: { display: true, text: '', font: { size: 11 } }
                    },
                    y: { 
                        ticks: { font: { size: 10 } },
                        title: { display: true, text: '期望伤害', font: { size: 11 } }
                    }
                }
            };
            
            damageChart = new Chart(document.getElementById('damageChart'), {
                type: 'line',
                data: { labels: [], datasets: [] },
                options: { ...commonOptions, scales: { ...commonOptions.scales, x: { ...commonOptions.scales.x, title: { display: true, text: '宠物法伤', font: { size: 11 } } } } }
            });
            
            defenseChart = new Chart(document.getElementById('defenseChart'), {
                type: 'line',
                data: { labels: [], datasets: [] },
                options: { ...commonOptions, scales: { ...commonOptions.scales, x: { ...commonOptions.scales.x, title: { display: true, text: '对方法防', font: { size: 11 } } } } }
            });
            
            tonglingChart = new Chart(document.getElementById('tonglingChart'), {
                type: 'bar',
                data: { labels: [], datasets: [] },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { ticks: { font: { size: 10 } }, title: { display: true, text: '通灵法等级', font: { size: 11 } } },
                        y: { ticks: { font: { size: 10 } }, title: { display: true, text: '期望伤害', font: { size: 11 } } }
                    }
                }
            });
            
            compareChart = new Chart(document.getElementById('compareChart'), {
                type: 'line',
                data: { labels: [], datasets: [] },
                options: { ...commonOptions, scales: { ...commonOptions.scales, x: { ...commonOptions.scales.x, title: { display: true, text: '对方法防', font: { size: 11 } } } } }
            });
        }
        
        function updateCharts() {
            const skills = getCurrentSkills();
            const tongling = parseFloat(document.getElementById('tongling').value);
            
            // 1. 法伤变化图
            const faShangLabels = [];
            const faShangData = [];
            for (let fs = 900; fs <= 1400; fs += 50) {
                faShangLabels.push(fs);
                const result = calculateDamage(fs, 800, tongling, skills);
                faShangData.push(Math.round(result.total));
            }
            damageChart.data.labels = faShangLabels;
            damageChart.data.datasets = [{
                label: '三分灵期望伤害',
                data: faShangData,
                borderColor: '#667eea',
                backgroundColor: 'rgba(102, 126, 234, 0.1)',
                fill: true,
                tension: 0.4,
                pointRadius: 3
            }];
            damageChart.update();
            
            // 2. 法防变化图
            const defLabels = [];
            const defData = [];
            for (let def = 400; def <= 1300; def += 50) {
                defLabels.push(def);
                const result = calculateDamage(1100, def, tongling, skills);
                defData.push(Math.round(result.total));
            }
            defenseChart.data.labels = defLabels;
            defenseChart.data.datasets = [{
                label: '三分灵期望伤害',
                data: defData,
                borderColor: '#764ba2',
                backgroundColor: 'rgba(118, 75, 162, 0.1)',
                fill: true,
                tension: 0.4,
                pointRadius: 3
            }];
            defenseChart.update();
            
            // 3. 通灵法对比图
            const tonglingLevels = [6, 7.5, 9, 10.5, 12];
            const tonglingLabels = ['6%', '7.5%', '9%', '10.5%', '12%'];
            const tonglingData = [];
            for (let tl of tonglingLevels) {
                const result = calculateDamage(1100, 800, tl, skills);
                tonglingData.push(Math.round(result.total));
            }
            tonglingChart.data.labels = tonglingLabels;
            tonglingChart.data.datasets = [{
                label: '期望伤害',
                data: tonglingData,
                backgroundColor: tonglingLevels.map(l => Math.abs(l - tongling) < 0.1 ? '#f59e0b' : '#667eea'),
                borderColor: '#667eea',
                borderWidth: 1
            }];
            tonglingChart.update();
            
            // 4. 宠物对比图
            const compareLabels = [];
            const petAData = [];
            const petBData = [];
            
            // 保存当前设置
            const currentSettings = {};
            ['moxin', 'huixin', 'xieli', 'falian', 'fabao'].forEach(id => {
                currentSettings[id] = document.getElementById(id).checked;
                currentSettings[id + 'Level'] = document.getElementById(id + 'Level').value;
            });
            
            for (let def = 400; def <= 1300; def += 50) {
                compareLabels.push(def);
                
                // 宠物A（全高级，协力12%）
                document.getElementById('moxinLevel').value = '0.2';
                document.getElementById('huixinLevel').value = '34.5';
                document.getElementById('xieliLevel').value = '0.12';
                document.getElementById('falianLevel').value = '0.3';
                document.getElementById('fabaoLevel').value = '0.15';
                const resultA = calculateDamage(1100, def, tongling, {
                    moxin: true, huixin: true, xieli: true, falian: true, fabao: true
                });
                petAData.push(Math.round(resultA.total));
                
                // 宠物B（全低级）
                document.getElementById('moxinLevel').value = '0.1';
                document.getElementById('huixinLevel').value = '17';
                document.getElementById('xieliLevel').value = '0.08';
                document.getElementById('falianLevel').value = '0.2';
                document.getElementById('fabaoLevel').value = '0.1';
                const resultB = calculateDamage(1100, def, tongling, {
                    moxin: true, huixin: true, xieli: true, falian: true, fabao: true
                });
                petBData.push(Math.round(resultB.total));
            }
            
            // 恢复当前设置
            for (let key in currentSettings) {
                const el = document.getElementById(key);
                if (el) el.value = currentSettings[key];
            }
            
            compareChart.data.labels = compareLabels;
            compareChart.data.datasets = [
                {
                    label: '宠物A（全高级，协力12%）',
                    data: petAData,
                    borderColor: '#667eea',
                    backgroundColor: 'rgba(102, 126, 234, 0.1)',
                    fill: false,
                    tension: 0.4,
                    pointRadius: 3
                },
                {
                    label: '宠物B（全低级）',
                    data: petBData,
                    borderColor: '#ef4444',
                    backgroundColor: 'rgba(239, 68, 68, 0.1)',
                    fill: false,
                    tension: 0.4,
                    pointRadius: 3
                }
            ];
            compareChart.update();
        }
        
        init();
    </script>
</body>
</html>
